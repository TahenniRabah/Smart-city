name: Ingestion Service CI

on:
  push:
    paths:
      - "services/ingestion-service/**"
      - ".github/workflows/ingestion-ci.yml"
  pull_request:
    paths:
      - "services/ingestion-service/**"
      - ".github/workflows/ingestion-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/ingestion-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Check Java version
        run: java --version

      - name: Run unit tests
        run: mvn -B test

      - name: Build package
        run: mvn -B package