server:
  port: 8083

spring:
  application:
    name: quality-service

  kafka:
    bootstrap-servers: localhost:9092

urbanhub:
  kafka:
    topics:
      measurements-received: measurements.received
      measurements-validated: measurements.validated
      measurements-rejected: measurements.rejected

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html